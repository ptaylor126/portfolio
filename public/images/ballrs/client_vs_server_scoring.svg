<svg width="100%" viewBox="0 0 400 670" xmlns="http://www.w3.org/2000/svg" style="font-family:'Inter',-apple-system,'system-ui','Segoe UI',sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- ═══ BEFORE ═══ -->
<text x="200" y="28" text-anchor="middle" style="fill:#1a1a1a;font-size:16px;font-weight:700;letter-spacing:0.04em">BEFORE</text>

<rect x="50" y="50" width="300" height="48" rx="10" fill="#F0EBE3" stroke="#B5ADA3" stroke-width="1"/>
<text x="200" y="74" text-anchor="middle" dominant-baseline="central" style="fill:#2A2520;font-size:15px;font-weight:600">User completes puzzle</text>

<line x1="200" y1="98" x2="200" y2="128" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5"/>

<rect x="50" y="128" width="300" height="60" rx="10" fill="#F0EBE3" stroke="#B5ADA3" stroke-width="1"/>
<text x="200" y="152" text-anchor="middle" dominant-baseline="central" style="fill:#2A2520;font-size:15px;font-weight:600">Client calculates score</text>
<text x="200" y="174" text-anchor="middle" dominant-baseline="central" style="fill:#7A7368;font-size:13px;font-weight:400">XP, streaks, league points</text>

<line x1="200" y1="188" x2="200" y2="218" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5"/>

<rect x="50" y="218" width="300" height="60" rx="10" fill="#F0EBE3" stroke="#B5ADA3" stroke-width="1"/>
<text x="200" y="242" text-anchor="middle" dominant-baseline="central" style="fill:#2A2520;font-size:15px;font-weight:600">Client writes to database</text>
<text x="200" y="264" text-anchor="middle" dominant-baseline="central" style="fill:#7A7368;font-size:13px;font-weight:400">Anyone can fake the results</text>

<text x="200" y="304" text-anchor="middle" style="fill:#3D3D3A;font-size:13px;font-weight:500;font-style:italic">The client can lie.</text>

<!-- ═══ DIVIDER ═══ -->
<line x1="40" y1="325" x2="360" y2="325" stroke="rgba(31,30,29,0.25)" stroke-width="1" stroke-dasharray="6 4"/>

<!-- ═══ AFTER ═══ -->
<text x="200" y="358" text-anchor="middle" style="fill:#1a1a1a;font-size:16px;font-weight:700;letter-spacing:0.04em">AFTER</text>

<rect x="50" y="374" width="300" height="48" rx="10" fill="#D4F0E9" stroke="#1ABC9C" stroke-width="1"/>
<text x="200" y="398" text-anchor="middle" dominant-baseline="central" style="fill:#0A4A3C;font-size:15px;font-weight:600">User completes puzzle</text>

<line x1="200" y1="422" x2="200" y2="452" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5"/>

<rect x="50" y="452" width="300" height="60" rx="10" fill="#D4F0E9" stroke="#1ABC9C" stroke-width="1"/>
<text x="200" y="476" text-anchor="middle" dominant-baseline="central" style="fill:#0A4A3C;font-size:15px;font-weight:600">Client sends result to server</text>
<text x="200" y="498" text-anchor="middle" dominant-baseline="central" style="fill:#14977D;font-size:13px;font-weight:400">"I solved it in 3 clues"</text>

<line x1="200" y1="512" x2="200" y2="542" marker-end="url(#arrow)" stroke="#737268" stroke-width="1.5"/>

<rect x="50" y="542" width="300" height="60" rx="10" fill="#D4F0E9" stroke="#1ABC9C" stroke-width="1"/>
<text x="200" y="566" text-anchor="middle" dominant-baseline="central" style="fill:#0A4A3C;font-size:15px;font-weight:600">Server calculates score</text>
<text x="200" y="588" text-anchor="middle" dominant-baseline="central" style="fill:#14977D;font-size:13px;font-weight:400">XP, streaks, league points</text>

<text x="200" y="628" text-anchor="middle" style="fill:#3D3D3A;font-size:13px;font-weight:500;font-style:italic">The client can't lie.</text>
</svg>
